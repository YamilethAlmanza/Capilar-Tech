<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capilar Tech – Contacto</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <header class="encabezado contenedor">
    <h1>Capilar Tech</h1>
    <nav class="menu">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="catalogo.html">Catálogo</a></li>
        <li><a href="contacto.html" class="activo">Contacto</a></li>
      </ul>
    </nav>
  </header>
  <main class="contenedor">
    <section class="bloque">
      <h2 style="text‑align:center; margin‑bottom:1.5rem;">Escríbenos tu consulta</h2>
      <form id="formContacto">
        <div class="grupo‑campo">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" required>
        </div>
        <div class="grupo‑campo">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" required>
        </div>
        <div class="grupo‑campo">
          <label for="mensaje">Mensaje / Consulta</label>
          <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn">Enviar mensaje</button>
      </form>
    </section>
  </main>
  <script src="js/interaccion.js"></script>
</body>
</html>
